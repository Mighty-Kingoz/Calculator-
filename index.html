<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MONOLITH | Minimal Calculator</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed-dim": "#aac7ff",
              "primary-fixed": "#ffddbb",
              "primary": "#ffb868",
              "on-error-container": "#ffdad6",
              "outline-variant": "#584235",
              "primary-container": "#e38c00",
              "surface-container": "#201f1f",
              "surface-container-lowest": "#0e0e0e",
              "on-secondary-fixed-variant": "#00468d",
              "on-secondary-fixed": "#001b3e",
              "on-primary-fixed-variant": "#673d00",
              "outline": "#a78b7c",
              "on-secondary-container": "#002957",
              "surface-bright": "#393939",
              "inverse-primary": "#885200",
              "on-tertiary-fixed": "#001f2a",
              "surface-container-high": "#2a2a2a",
              "on-primary": "#482900",
              "primary-fixed-dim": "#ffb868",
              "surface-container-low": "#1c1b1b",
              "secondary-fixed": "#d6e3ff",
              "surface-variant": "#353534",
              "on-surface": "#e5e2e1",
              "on-background": "#e5e2e1",
              "secondary": "#aac7ff",
              "inverse-surface": "#e5e2e1",
              "surface-tint": "#ffb868",
              "surface": "#131313",
              "on-error": "#690005",
              "surface-dim": "#131313",
              "error-container": "#93000a",
              "tertiary-container": "#33acd7",
              "on-tertiary-container": "#003c4f",
              "error": "#ffb4ab",
              "on-tertiary": "#003546",
              "on-primary-fixed": "#2b1700",
              "on-tertiary-fixed-variant": "#004d64",
              "on-surface-variant": "#e0c0af",
              "background": "#131313",
              "tertiary-fixed-dim": "#68d3ff",
              "on-secondary": "#003064",
              "on-primary-container": "#512f00",
              "surface-container-highest": "#353534",
              "secondary-container": "#3e90ff",
              "inverse-on-surface": "#313030",
              "tertiary-fixed": "#bee9ff",
              "tertiary": "#68d3ff"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            background-color: #131313;
            min-height: 100dvh;
        }
        /* Custom scrollbar-less design */
        ::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary selection:text-on-primary flex flex-col">
<main class="flex-grow flex flex-col max-w-md mx-auto w-full relative">
<!-- Display Area -->
<section class="flex-grow flex flex-col justify-end px-8 py-12 bg-surface-container-lowest overflow-hidden">
<div class="text-right mb-2">
<p class="text-on-surface-variant font-headline text-2xl tracking-tight opacity-60 min-h-[1.5em] break-all" id="expression"></p>
</div>
<div class="text-right">
<h2 class="text-on-surface font-headline font-bold text-6xl md:text-7xl tracking-tighter transition-all duration-200 truncate" id="display">0</h2>
</div>
</section>
<!-- Keypad -->
<section class="bg-surface p-6 pb-8">
<div class="grid grid-cols-4 gap-4">
<!-- Row 1 -->
<button class="bg-surface-bright text-error font-headline text-xl h-16 rounded-xl flex items-center justify-center hover:brightness-110 active-scale transition-all" onclick="clearDisplay()">AC</button>
<button class="bg-surface-bright text-primary font-headline text-xl h-16 rounded-xl flex items-center justify-center hover:brightness-110 active-scale transition-all" onclick="backspace()">
<span class="material-symbols-outlined">backspace</span>
</button>
<button class="bg-surface-bright text-primary font-headline text-xl h-16 rounded-xl flex items-center justify-center hover:brightness-110 active-scale transition-all" onclick="applyPercentage()">
<span class="material-symbols-outlined">percent</span>
</button>
<button class="bg-surface-container-high text-primary font-headline text-2xl h-16 rounded-xl flex items-center justify-center hover:brightness-110 active-scale transition-all" onclick="appendOperator('/')">÷</button>
<!-- Row 2 -->
<button class="bg-surface-container text-on-surface font-headline text-2xl h-16 rounded-xl flex items-center justify-center hover:brightness-110 active-scale transition-all" onclick="appendNumber('7')">7</button>
<button class="bg-surface-container text-on-surface font-headline text-2xl h-16 rounded-xl flex items-center justify-center hover:brightness-110 active-scale transition-all" onclick="appendNumber('8')">8</button>
<button class="bg-surface-container text-on-surface font-headline text-2xl h-16 rounded-xl flex items-center justify-center hover:brightness-110 active-scale transition-all" onclick="appendNumber('9')">9</button>
<button class="bg-surface-container-high text-primary font-headline text-2xl h-16 rounded-xl flex items-center justify-center hover:brightness-110 active-scale transition-all" onclick="appendOperator('*')">×</button>
<!-- Row 3 -->
<button class="bg-surface-container text-on-surface font-headline text-2xl h-16 rounded-xl flex items-center justify-center hover:brightness-110 active-scale transition-all" onclick="appendNumber('4')">4</button>
<button class="bg-surface-container text-on-surface font-headline text-2xl h-16 rounded-xl flex items-center justify-center hover:brightness-110 active-scale transition-all" onclick="appendNumber('5')">5</button>
<button class="bg-surface-container text-on-surface font-headline text-2xl h-16 rounded-xl flex items-center justify-center hover:brightness-110 active-scale transition-all" onclick="appendNumber('6')">6</button>
<button class="bg-surface-container-high text-secondary font-headline text-3xl h-16 rounded-xl flex items-center justify-center hover:brightness-110 active-scale transition-all" onclick="appendOperator('-')">−</button>
<!-- Row 4 -->
<button class="bg-surface-container text-on-surface font-headline text-2xl h-16 rounded-xl flex items-center justify-center hover:brightness-110 active-scale transition-all" onclick="appendNumber('1')">1</button>
<button class="bg-surface-container text-on-surface font-headline text-2xl h-16 rounded-xl flex items-center justify-center hover:brightness-110 active-scale transition-all" onclick="appendNumber('2')">2</button>
<button class="bg-surface-container text-on-surface font-headline text-2xl h-16 rounded-xl flex items-center justify-center hover:brightness-110 active-scale transition-all" onclick="appendNumber('3')">3</button>
<button class="bg-surface-container-high text-tertiary font-headline text-3xl h-16 rounded-xl flex items-center justify-center hover:brightness-110 active-scale transition-all" onclick="appendOperator('+')">+</button>
<!-- Row 5 -->
<button class="bg-surface-container text-on-surface font-headline text-2xl h-16 rounded-xl flex items-center justify-center hover:brightness-110 active-scale transition-all col-span-2" onclick="appendNumber('0')">0</button>
<button class="bg-surface-container text-on-surface font-headline text-2xl h-16 rounded-xl flex items-center justify-center hover:brightness-110 active-scale transition-all" onclick="appendNumber('.')">.</button>
<button class="bg-gradient-to-b from-primary to-primary-container text-on-primary-container font-headline text-3xl h-16 rounded-xl flex items-center justify-center shadow-lg active-scale transition-all" onclick="calculate()">
<span class="material-symbols-outlined font-bold">equal</span>
</button>
</div>
</section>
</main>
<script>
        let currentInput = '0';
        let fullExpression = '';
        const displayElement = document.getElementById('display');
        const expressionElement = document.getElementById('expression');

        function updateDisplay() {
            displayElement.innerText = currentInput;
            expressionElement.innerText = fullExpression;
            
            // Dynamic font size for long numbers
            if (currentInput.length > 8) {
                displayElement.classList.remove('text-6xl', 'md:text-7xl');
                displayElement.classList.add('text-4xl', 'md:text-5xl');
            } else {
                displayElement.classList.remove('text-4xl', 'md:text-5xl');
                displayElement.classList.add('text-6xl', 'md:text-7xl');
            }
        }

        function appendNumber(num) {
            if (fullExpression.endsWith('=')) {
                fullExpression = '';
                currentInput = '0';
            }
            if (currentInput === '0' && num !== '.') {
                currentInput = num;
            } else {
                if (num === '.' && currentInput.includes('.')) return;
                currentInput += num;
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (fullExpression.endsWith('=')) {
                fullExpression = currentInput + ' ' + op + ' ';
                currentInput = '0';
            } else if (currentInput !== '0' || fullExpression !== '') {
                if (currentInput !== '0') {
                    fullExpression += currentInput + ' ' + op + ' ';
                } else {
                    // Replace last operator
                    fullExpression = fullExpression.trim().split(' ').slice(0, -1).join(' ') + ' ' + op + ' ';
                }
                currentInput = '0';
            }
            updateDisplay();
        }

        function applyPercentage() {
            if (currentInput !== '0') {
                currentInput = (parseFloat(currentInput) / 100).toString();
                updateDisplay();
            }
        }

        function clearDisplay() {
            currentInput = '0';
            fullExpression = '';
            updateDisplay();
        }

        function backspace() {
            if (fullExpression.endsWith('=')) return;
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        function calculate() {
            if (fullExpression === '' || fullExpression.endsWith('=')) return;
            
            const finalExpression = fullExpression + (currentInput === '0' ? '' : currentInput);
            // Remove trailing operator if any
            let evalString = finalExpression.trim();
            if (['+', '-', '*', '/'].includes(evalString.slice(-1))) {
                evalString = evalString.slice(0, -1);
            }

            try {
                // Map symbols to JS operators
                const sanitized = evalString.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
                const result = eval(sanitized);
                
                fullExpression = finalExpression + ' =';
                currentInput = Number.isInteger(result) ? result.toString() : parseFloat(result.toFixed(8)).toString();
                updateDisplay();
            } catch (e) {
                currentInput = 'Error';
                updateDisplay();
                setTimeout(clearDisplay, 1500);
            }
        }
    </script>
</body></html>
